{% extends 'base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<div>
  <div id="post-page">
    <h1>{{ post.title }}</h1>
    <form action="/edit/{{ post.postid }}" method="post">
        <textarea name="content" rows="5" cols="40">{{ post.desc }}</textarea>
        <br><br>
        <input type="submit" value="Päivitä postaus">
    </form>
  </div>
  <footer><p>{{ post.timestamp }}</p></footer>
</div>
{% endblock %}
